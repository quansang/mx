name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.zip.sig

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.tar.gz" -o \
            -name "*.AppImage.tar.gz.sig" -o \
            -name "*-setup.exe" -o \
            -name "*-setup.nsis.zip" -o \
            -name "*-setup.nsis.zip.sig" -o \
            -name "*.msi" -o \
            -name "*.msi.zip" -o \
            -name "*.msi.zip.sig" \
          \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate latest.json
        run: |
          cd release-files
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PUB_DATE="$DATE"
          NOTES="mx v${VERSION}"

          # Read signatures
          MAC_SIG=""
          LINUX_SIG=""
          WIN_SIG=""

          if [ -f *.app.tar.gz.sig ]; then
            MAC_SIG=$(cat *.app.tar.gz.sig)
          fi
          if [ -f *.AppImage.tar.gz.sig ]; then
            LINUX_SIG=$(cat *.AppImage.tar.gz.sig)
          fi
          if [ -f *-setup.nsis.zip.sig ]; then
            WIN_SIG=$(cat *-setup.nsis.zip.sig)
          fi

          # Get filenames
          MAC_TAR=$(ls *.app.tar.gz 2>/dev/null | head -1)
          LINUX_TAR=$(ls *.AppImage.tar.gz 2>/dev/null | head -1)
          WIN_ZIP=$(ls *-setup.nsis.zip 2>/dev/null | head -1)

          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"

          # Build JSON
          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${BASE}/${MAC_TAR}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE}/${LINUX_TAR}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE}/${WIN_ZIP}"
              }
            }
          }
          ENDJSON

          cat latest.json

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "mx v${VERSION}" \
            --notes "Download the installer for your platform below." \
            release-files/*
